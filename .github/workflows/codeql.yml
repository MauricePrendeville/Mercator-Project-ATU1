name: "Project Workflow"
on:
  workflow_call: 
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '25 12 * * 4'  
    
jobs: 
  #------------Build workflow-----------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
  #-----------Test workflow------------ 
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x
      - name: Restore dependencies
        run: dotnet restore      
      - name: Test with coverage
        run: | 
          dotnet test VendorProcessManager-Tests/VPM_UnitTests.csproj \
          --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage \
          --logger "trx;LogFileName=results.trx"
      
      - name: Check coverage output
        run: 
          echo "Coverage directory contents:"
          find ./coverage -type f

      - name: Upload coverage artifact file      
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-results
          path: ./coverage/**/*       

      - name: Upload test reults      
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
          
  #------------Sonar Cloud-----------
  sonar:
    needs: test
    runs-on: ubuntu-latest
    permissions: 
      contents: read
      pull-requests: write
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with: 
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with: 
          dotnet-version: 8.0.x
          
      - name: Download coverage artifact file
        uses: actions/download-artifact@v7        
        with: 
          name: coverage-results
          path: ./coverage
         
      - name: List downloaded files
        run: find ./coverage -type f || echo "No files downloaded"
        
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: > 
            -Dsonar.organization=mauriceprendeville
            -Dsonar.projectKey=MauricePrendeville_Mercator-Project-ATU1
            -Dsonar.cs.opencover.reportsPaths=coverage/**/coverage.opencover.xml

  #------------SBOM flow---------
  sbom: 
    runs-on: ubuntu-latest
        
    steps:
      - uses: actions/checkout@v6
        
      - uses: advanced-security/sbom-generator-action@v0.0.1
        id: sbom
        env: 
          GITHUB_TOKEN: ${{ github.token }}
      - name: Verify SBOM against know vulnerabilities
        uses: anchore/grype-action@v1
        with:
          sbom: ${{ steps.sbom.outputs.fileName }}
          fail-build: true
          severity-cutoff: critical
          
      - uses: actions/upload-artifact@v4
        with: 
          path: ${{steps.sbom.outputs.fileName }}
          name: "SBOM"
            
  #-------------CodeQL workflow------------      
  analyze:
    name: Analyze (${{ matrix.language }})
    needs: [build, test]      
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
    # required for all workflows
      security-events: write
    # required to fetch internal or private CodeQL packs
      packages: read
    # only required for workflows in private repositories
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
         include:
           - language: actions
             build-mode: none
           - language: csharp
             build-mode: none
           - language: javascript-typescript
             build-mode: none
          
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
    
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
      
      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo 'If you are using a "manual" build mode for one or more of the' \
            'languages you are analyzing, replace this with the commands to build' \
            'your code, for example:'
          echo '  make bootstrap'
          echo '  make release'
          exit 1
  
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
  
  
